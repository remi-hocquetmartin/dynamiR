site_name: microRNA Binding Site Analysis Tool
site_description: A professional tool for identifying microRNA binding sites on target mRNA sequences
site_author: Your Team Name
site_url: https://yoursite.com/

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: blue

nav:
  - Home: index.md
  - Documentation:
    - Getting Started: guide/getting_started.md
    - Installation: guide/installation.md
  - Features:
    - Matching Mode: features/matching_mode.md
    - Dynamite Mode (Database Scan): features/dynamite_mode.md
  - Understanding:
    - Biological Concepts: concepts/biology.md
    - How It Works: concepts/how_it_works.md
  - FAQ: guide/faq.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc
